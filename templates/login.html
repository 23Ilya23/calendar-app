<!DOCTYPE html>
<html>
<head>
    <title>📅 Вход в систему</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 2px solid #4a90e2;
        }
        .logo {
            font-size: 80px;
            margin-bottom: 10px;
        }
        h1 {
            color: #4a90e2;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            background: rgba(255,255,255,0.9);
            color: #333;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 10px #4a90e2;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #357abd;
            transform: scale(1.02);
        }
        .register-link {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .register-link a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .error {
            background: rgba(255,71,87,0.2);
            border: 2px solid #ff4757;
            color: #ff4757;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .info-box {
            background: rgba(74,144,226,0.1);
            border: 1px solid #4a90e2;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #a0c0ff;
        }
        .demo-credentials {
            font-size: 0.8em;
            color: #666;
            margin-top: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .theme-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
        body.light-theme .theme-btn {
            background: rgba(0,0,0,0.1);
            color: #000000;
            border: 1px solid #ccc;
        }
        body.light-theme .register-link a {
            color: #4a90e2;
        }
        body.light-theme .info-box {
            color: #4a90e2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
            <button onclick="toggleTheme()" class="theme-btn" id="themeToggle">☀️ Светлая тема</button>
        </div>
        
        <div class="login-container">
            <div class="logo">📅</div>
            <h1>Вход в календарь</h1>
            
            <!-- Информация для пользователя -->
            <div class="info-box">
                ⚡ После входа вы попадёте:
                <br>✅ В календарь — если заявка принята
                <br>⏳ На страницу заявок — если ожидает
            </div>
            
            {% if error %}
            <div class="error">
                ❌ {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" action="/login">
                <div class="form-group">
                    <input type="text" name="username" placeholder="Логин" required autofocus>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="Пароль" required>
                </div>
                <button type="submit">🔓 Войти</button>
            </form>
            
            <div class="register-link">
                Нет аккаунта? <a href="/register">Зарегистрироваться</a>
            </div>
            
            <div class="demo-credentials">
                👑 Админ: admin / спец.пароль
            </div>
        </div>
    </div>

    <script>
        // Анимация загрузки при отправке формы
        document.querySelector('form').addEventListener('submit', function() {
            const btn = document.querySelector('button');
            btn.innerHTML = '⏳ Вход...';
            btn.disabled = true;
        });
        
        // Фокус на поле ввода
        window.onload = function() {
            document.querySelector('input[name="username"]').focus();
        };

        // Функция для переключения темы
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('themeToggle');
            
            if (body.classList.contains('light-theme')) {
                body.classList.remove('light-theme');
                body.classList.add('dark-theme');
                themeBtn.innerHTML = '☀️ Светлая тема';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark-theme');
                body.classList.add('light-theme');
                themeBtn.innerHTML = '🌙 Тёмная тема';
                localStorage.setItem('theme', 'light');
            }
        }
        
        // Загрузка сохранённой темы
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            const themeBtn = document.getElementById('themeToggle');
            
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
                document.body.classList.remove('dark-theme');
                if (themeBtn) themeBtn.innerHTML = '🌙 Тёмная тема';
            } else {
                document.body.classList.add('dark-theme');
                document.body.classList.remove('light-theme');
                if (themeBtn) themeBtn.innerHTML = '☀️ Светлая тема';
            }
        });
    </script>
</body>
</html>

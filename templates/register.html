<!DOCTYPE html>
<html>
<head>
    <title>📝 Регистрация</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .register-container {
            max-width: 500px;
            margin: 30px auto;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 2px solid #00b7ff;
        }
        .logo {
            font-size: 80px;
            margin-bottom: 10px;
        }
        h1 {
            color: #ffffff;
            margin-bottom: 30px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group.full-width {
            grid-column: span 2;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #a0c0ff;
            font-size: 0.9em;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            color: #383838;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            box-shadow: 0 0 10px #2eccbf;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }
        button:hover {
            background: #27ae60;
            transform: scale(1.02);
        }
        .login-link {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .login-link a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: bold;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .error {
            background: rgba(255,71,87,0.2);
            border: 2px solid #ff4757;
            color: #ff4757;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .info-box {
            background: rgba(46,204,113,0.1);
            border: 1px solid #2ecc71;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #a0c0ff;
        }
        .password-hint {
            font-size: 0.8em;
            color: #666;
            margin-top: 5px;
        }
        .theme-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
        body.light-theme .theme-btn {
            background: rgba(0,0,0,0.1);
            color: #000000;
            border: 1px solid #ccc;
        }
        body.light-theme h1 {
            color: #000000;
        }
        body.light-theme .info-box {
            color: #4a90e2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
            <button onclick="toggleTheme()" class="theme-btn" id="themeToggle">☀️ Светлая тема</button>
        </div>
        
        <div class="register-container">
            <div class="logo">📝</div>
            <h1>Регистрация</h1>
            
            <div class="info-box">
                📌 После регистрации автоматически создаётся заявка
                <br>⏳ Ожидайте решения администратора
            </div>
            
            {% if error %}
            <div class="error">
                ❌ {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" action="/register">
                <div class="form-grid">
                    <div class="form-group">
                        <label>👤 Имя</label>
                        <input type="text" name="first_name" placeholder="Иван" required>
                    </div>
                    
                    <div class="form-group">
                        <label>👤 Фамилия</label>
                        <input type="text" name="last_name" placeholder="Иванов" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>🔑 Логин</label>
                        <input type="text" name="username" placeholder="ivan_ivanov" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>📧 Email</label>
                        <input type="email" name="email" placeholder="ivan@example.com" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>🔒 Пароль</label>
                        <input type="password" name="password" placeholder="••••••••" required>
                        <div class="password-hint">Минимум 6 символов</div>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>👔 Роль</label>
                        <select name="role">
                            <option value="student">👨‍🎓 Студент</option>
                            <option value="teacher">👨‍🏫 Преподаватель</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit">✅ Зарегистрироваться</button>
            </form>
            
            <div class="login-link">
                Уже есть аккаунт? <a href="/login">Войти</a>
            </div>
        </div>
    </div>

    <script>
        // Анимация загрузки при отправке формы
        document.querySelector('form').addEventListener('submit', function() {
            const btn = document.querySelector('button');
            btn.innerHTML = '⏳ Регистрация...';
            btn.disabled = true;
        });
        
        // Простая валидация пароля
        document.querySelector('input[name="password"]').addEventListener('input', function() {
            const hint = document.querySelector('.password-hint');
            if (this.value.length < 6) {
                hint.style.color = '#ff4757';
            } else {
                hint.style.color = '#2ecc71';
            }
        });

        // Функция для переключения темы
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('themeToggle');
            
            if (body.classList.contains('light-theme')) {
                body.classList.remove('light-theme');
                body.classList.add('dark-theme');
                themeBtn.innerHTML = '☀️ Светлая тема';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark-theme');
                body.classList.add('light-theme');
                themeBtn.innerHTML = '🌙 Тёмная тема';
                localStorage.setItem('theme', 'light');
            }
        }
        
        // Загрузка сохранённой темы
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            const themeBtn = document.getElementById('themeToggle');
            
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
                document.body.classList.remove('dark-theme');
                if (themeBtn) themeBtn.innerHTML = '🌙 Тёмная тема';
            } else {
                document.body.classList.add('dark-theme');
                document.body.classList.remove('light-theme');
                if (themeBtn) themeBtn.innerHTML = '☀️ Светлая тема';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Регистрация</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .role-selector {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            justify-content: center;
        }
        .role-option {
            flex: 1;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .role-option:hover {
            transform: translateY(-5px);
            background: rgba(74,144,226,0.2);
        }
        .role-option.selected {
            border-color: #4a90e2;
            background: rgba(74,144,226,0.2);
        }
        .role-option.student.selected {
            border-color: #2ecc71;
        }
        .role-option.teacher.selected {
            border-color: #ffd700;
        }
        .role-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .role-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .role-desc {
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Регистрация</h1>
        
        <div class="warning" style="margin-bottom: 30px;">
            ⚠️ После регистрации вы сразу сможете подавать заявки<br>
            Дождитесь, пока администратор рассмотрит вашу заявку
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/register" id="registerForm">
            <!-- ВЫБОР РОЛИ -->
            <div style="margin-bottom: 30px;">
                <h3 style="text-align: center; margin-bottom: 20px;">Выберите роль:</h3>
                <div class="role-selector">
                    <div class="role-option student" onclick="selectRole('student')" id="studentRole">
                        <div class="role-icon">👨‍🎓</div>
                        <div class="role-title">Студент</div>
                        <div class="role-desc">Подавайте заявки на события</div>
                    </div>
                    <div class="role-option teacher" onclick="selectRole('teacher')" id="teacherRole">
                        <div class="role-icon">👨‍🏫</div>
                        <div class="role-title">Преподаватель</div>
                        <div class="role-desc">Подавайте заявки на события</div>
                    </div>
                </div>
                <input type="hidden" name="role" id="selectedRole" value="student" required>
            </div>

            <!-- ПОЛЯ РЕГИСТРАЦИИ -->
            <div class="form-group">
                <label>👤 Имя</label>
                <input type="text" name="first_name" required placeholder="Введите имя">
            </div>
            <div class="form-group">
                <label>👤 Фамилия</label>
                <input type="text" name="last_name" required placeholder="Введите фамилию">
            </div>
            <div class="form-group">
                <label>👤 Логин</label>
                <input type="text" name="username" required placeholder="Придумайте логин">
            </div>
            <div class="form-group">
                <label>🔐 Пароль</label>
                <input type="password" name="password" required placeholder="Придумайте пароль">
            </div>
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" name="email" required placeholder="Ваш email">
            </div>

            <button type="submit" style="margin-top: 20px;">Зарегистрироваться</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            <a href="/login">Уже есть аккаунт? Войти</a>
        </p>
    </div>

    <script>
        function selectRole(role) {
            document.getElementById('selectedRole').value = role;
            
            document.getElementById('studentRole').classList.remove('selected');
            document.getElementById('teacherRole').classList.remove('selected');
            
            if (role === 'student') {
                document.getElementById('studentRole').classList.add('selected');
            } else {
                document.getElementById('teacherRole').classList.add('selected');
            }
        }
        
        selectRole('student');
    </script>
</body>
</html>
